apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api-gateway
  namespace: backend
spec:
  replicas: 3
  selector:
    matchLabels: { app: identity-api-gateway }
  template:
    metadata:
      labels: { app: identity-api-gateway }
    spec:
      containers:
        - name: identity-api-gateway
          image: registry.identitysec.internal/identity-api-gateway:latest
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
